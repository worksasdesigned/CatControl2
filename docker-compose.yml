version: "3.8"

services:
  db:
    image: mariadb:11.4
    container_name: catcontrol_db
    restart: unless-stopped
    environment:
      - MYSQL_DATABASE=catcontrol
      - MYSQL_USER=phpuser
      - MYSQL_PASSWORD=changeme123
      - MYSQL_ROOT_PASSWORD=rootpassword
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database.sql:/docker-entrypoint-initdb.d/20-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "phpuser", "-pchangeme123"]
      interval: 5s
      timeout: 3s
      retries: 30

  web:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: catcontrol_web
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_HOST=db
      - DB_NAME=catcontrol
      - DB_USER=phpuser
      - DB_PASSWORD=changeme123
      - ADMIN_EMAIL=admin@localhost
      - ALLOW_INSTALL=1
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
    restart: unless-stopped

volumes:
  db_data: