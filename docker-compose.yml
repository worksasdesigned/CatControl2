services:
  db:
    image: mariadb:11.4
    container_name: catcontrol_db
    restart: unless-stopped
    environment:
      - MYSQL_DATABASE=catcontrol
      - MYSQL_USER=phpuser
      - MYSQL_PASSWORD=${DB_PASSWORD:-changeme123}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-rootpassword}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "phpuser", "-p${DB_PASSWORD:-changeme123}"]
      interval: 5s
      timeout: 3s
      retries: 30

  web:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: catcontrol_web
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_HOST=db
      - DB_NAME=catcontrol
      - DB_USER=phpuser
      - DB_PASSWORD=${DB_PASSWORD:-changeme123}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@localhost}
      - ALLOW_INSTALL=1
      - APACHE_DOCUMENT_ROOT=/var/www/html
    ports:
      - "8280:80"
    volumes:
      - uploads_data:/var/www/html/uploads
      - config_data:/var/www/html/config
    restart: unless-stopped

volumes:
  db_data:
  uploads_data:
  config_data:
