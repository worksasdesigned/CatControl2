version: "3.9"

services:
  db:
    image: mariadb:10.11
    container_name: catcontrol_db
    environment:
      - MYSQL_DATABASE=catcontrol
      - MYSQL_USER=phpuser
      - MYSQL_PASSWORD=changeme123
      - MYSQL_ROOT_PASSWORD=rootpass
    ports:
      - "3308:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-prootpass"]
      interval: 5s
      timeout: 3s
      retries: 30

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: catcontrol_app
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_HOST=db
      - DB_NAME=catcontrol
      - DB_USER=phpuser
      - DB_PASSWORD=changeme123
      - ALLOW_INSTALL=1
    ports:
      - "8242:80"
    volumes:
      - app_config:/var/www/html/config
      - app_uploads:/var/www/html/uploads
    restart: unless-stopped

volumes:
  db_data:
  app_config:
  app_uploads: